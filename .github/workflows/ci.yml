name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build · test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config bubblewrap
          # Ubuntu 23.10+ blocks unprivileged user namespaces by default (AppArmor), which makes an
          # installed bwrap fail at runtime even though it's on PATH — the exact case BwrapSandbox::detect()
          # probes for. Disable it here so the Linux OS-confinement tests get real coverage instead of a
          # silent detect()-is-None skip; the key may not exist on older kernels, hence `|| true`.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  audit:
    name: cargo audit (RUSTSEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
